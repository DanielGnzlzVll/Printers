[gcode_macro PREPARE_ABS]
description: Prepare the chamber for ABS
gcode:

    SET_LED_EFFECT EFFECT=warming_up REPLACE=2


    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    G90
    G1 X150 Y0 Z10 F6000

    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=110
    SET_FAN_SPEED FAN=fan2 SPEED=0.7


[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 80
gcode:
    {% set slow = 240 %}
    {% set medium = 900 %}

    {% if printer.extruder.temperature < 180 %}
        RESPOND TYPE=error MSG="Hotend too cold for unload"
    {% else %}

    SAVE_GCODE_STATE NAME=unload_state

    G91
    M83
    G92 E0

    # compact slightly
    G1 E3 F300

    # small retract out of melt pool
    G1 E-5 F{medium}

    # allow filament core to solidify
    G4 P5000

    # gentle break from melt zone
    G1 E-6 F600

    # very slow extraction through heatbreak
    G1 E-{unload_distance} F{slow}

    M400
    RESTORE_GCODE_STATE NAME=unload_state

    {% endif %}

#####################################################################
# LOAD FILAMENT
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Load filament and allow continuous purge
gcode:
    SAVE_GCODE_STATE NAME=load_state

    M117 Loading Filament

    G91
    G92 E0

    # Fast move through extruder
    G1 E80 F2400

    # Approach hotend
    G1 E40 F1200

    # Melt zone (Rapido / UHF)
    G1 E30 F300

    # Initial purge
    G1 E20 F300

    M400

    SHOW_PURGE_MENU

    RESTORE_GCODE_STATE NAME=load_state


#####################################################################
# PURGE MENU
#####################################################################

[gcode_macro SHOW_PURGE_MENU]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Filament Load"
    RESPOND TYPE=command MSG="action:prompt_text Continue purging?"
    RESPOND TYPE=command MSG="action:prompt_button PURGE MORE|PURGE_MORE|primary"
    RESPOND TYPE=command MSG="action:prompt_button DONE|PURGE_DONE|success"
    RESPOND TYPE=command MSG="action:prompt_show"


#####################################################################
# PURGE MORE
#####################################################################

[gcode_macro PURGE_MORE]
gcode:
    M117 Purging
    G91
    G1 E15 F300
    M400
    SHOW_PURGE_MENU


#####################################################################
# FINISH
#####################################################################

[gcode_macro PURGE_DONE]
gcode:
    M117 Finished
    G91
    G1 E-2 F1800
    M400
    RESPOND TYPE=command MSG="action:prompt_end"


#####################################################################
# CLEAN NOZZLE
#####################################################################

[gcode_macro CLEAN_NOZZLE]
variable_start_x: 228
variable_start_y: 309
variable_start_z: 1
variable_wipe_dist_x: -35
variable_wipe_dist_y: 2
variable_wipe_qty: 10
variable_wipe_spd: 200
variable_raise_distance: 20

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
  G28
 {% endif %}

 G90

 ## Move nozzle to start position
 G1 Z6
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Diamond wipe adapted for rubber wiper
 {% for wipes in range(wipe_qty) %}
    G1 X{start_x + wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 60}
    G1 X{start_x} Y{start_y - wipe_dist_y} F{wipe_spd * 60}
 {% endfor %}

 ## Raise nozzle
 G1 Z{raise_distance}
 G1 X282